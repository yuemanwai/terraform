apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-webapp-chart.fullname" . }}
  labels:
    {{- include "my-webapp-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "my-webapp-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "my-webapp-chart.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "my-webapp-chart.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }} # <--- 改為使用 .Values.service.targetPort
              protocol: TCP
          env: # <--- 這個 'env:' 區塊已經被移動到這裡，與 image, ports 同級
              - name: SQLALCHEMY_DATABASE_URI # <--- 這是新的環境變數名稱，你的應用程式需要讀取這個
                value: {{ .Values.database.db_url | quote }} # <--- 從 values.yaml 中獲取完整的 URL 字串
            # - name: DB_HOST
            #   value: {{ .Values.database.host }}
            # - name: DB_PORT
            #   value: {{ .Values.database.port | quote }} # 確保端口是字串
            # - name: DB_NAME
            #   value: {{ .Values.database.name }}
            # - name: DB_USER
            #   value: {{ .Values.database.user }}
            # - name: DB_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: {{ include "my-webapp-chart.fullname" . }}-db-secret # <--- 確保名稱正確
            #       key: DB_PASSWORD # <--- 確保鍵名與 secret.yaml 中定義的完全一致 (DB_PASSWORD)
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}