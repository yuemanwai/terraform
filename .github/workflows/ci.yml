name: AWS Terraform Security & Cost Analysis

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write # 必須有，Infracost 才能在 PR 留言

jobs:
  # ====================================================
  # Job 1: Security Scan (Trivy)
  # 跑係所有 Push & PR，確保安全
  # ====================================================
  trivy-security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # # Step 0: 下載 Template 避免 Error
      # - name: Download Trivy HTML Template
      #   run: |
      #     curl -sL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -o html.tpl

      # Step 1: 生成 HTML 報告 (供下載)
      - name: Generate Trivy HTML Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./aws-tf"
          scanners: "vuln,secret,misconfig"
          format: "template"
          template: "@.github/trivy.tpl" # <--- 改咗這裡！直接讀本地檔案
          output: "aws_report.html"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

      # Step 2: Console 顯示重點 Table (High/Critical)
      - name: Show Security Risks in Console
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./aws-tf"
          scanners: "vuln,secret,misconfig"
          format: "table"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

      # Step 3: 上傳 Artifact
      - name: Upload Security Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aws-security-report
          path: aws_report.html
          retention-days: 7

  # ====================================================
  # Job 2: Cost Estimation (Infracost)
  # 只在 Pull Request 觸發 (因為需要對比前後差異)
  # ====================================================
  cost-estimation:
    name: Cost Estimation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
          currency: USD

      # 計算 Base Branch (舊 Code) 價錢
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: "${{ github.event.pull_request.base.ref }}"

      - name: Generate Baseline Cost
        run: |
          infracost breakdown --path aws-tf \
                              --format json \
                              --out-file /tmp/infracost-base.json

      # 計算 PR Branch (新 Code) 價錢
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Generate Cost Diff
        run: |
          infracost diff --path aws-tf \
                         --format json \
                         --compare-to /tmp/infracost-base.json \
                         --out-file /tmp/infracost.json

      # Console 顯示價錢表 (保險線)
      - name: Show Cost Table in Console
        run: |
          infracost output --path /tmp/infracost.json --format table

      # PR 留言
      - name: Post Infracost Comment
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update

      # 生成 HTML 報告
      - name: Generate Cost HTML Report
        run: |
          infracost output --path /tmp/infracost.json --format html --out-file infracost-report.html

      # 上傳 Artifact
      - name: Upload Cost Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infracost-report
          path: |
            infracost-report.html
            /tmp/infracost.json
          retention-days: 7

  # ====================================================
  # Job 3: Update Main Branch Cost to Dashboard
  # ====================================================
  infracost-main-update:
    name: Update Infracost Dashboard
    runs-on: ubuntu-latest
    # 呢個 Job 只會在 push 去 main 時執行 (即係 Merge 後)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      # 1. 安裝 Infracost 並設定 API Key
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # 2. 計算 main branch 嘅成本
      - name: Run Infracost Breakdown
        run: |
          infracost breakdown --path aws-tf \
                              --format json \
                              --out-file infracost.json

      # 3. Upload 去 Infracost Cloud Dashboard
      - name: Upload to Infracost Cloud
        run: |
          infracost upload --path infracost.json
