name: AWS Terraform Security & Cost Analysis

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write # 必須有，Infracost 才能在 PR 留言

jobs:
  # ====================================================
  # Job 1: Security Scan (Trivy)
  # 跑係所有 Push & PR，確保安全
  # ====================================================
  trivy-security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 0: 下載 Template (如你所願，讀本地 .github/trivy.tpl)
      # 確保你 repo 入面真係有呢個 file，否則這步會 fail
      # 如果未有，可以暫時 comment 咗 template 相關行數

      - name: Generate Trivy HTML Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./aws-tf"
          scanners: "vuln,secret,misconfig"
          format: "template"
          template: "@.github/trivy.tpl"
          output: "aws_report.html"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"

      - name: Show Security Risks in Console
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./aws-tf"
          scanners: "vuln,secret,misconfig"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Upload Security Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aws-security-report
          path: aws_report.html
          retention-days: 7

  # ====================================================
  # Job 2: Cost Estimation (Pull Request 專用)
  # 邏輯：有對比 (Diff)，有留言 (Comment)
  # ====================================================
  cost-estimation-pr:
    name: Cost Estimation (PR Diff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
          currency: USD

      # 計算 Base (舊)
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: "${{ github.event.pull_request.base.ref }}"

      - name: Generate Baseline Cost
        run: |
          infracost breakdown --path aws-tf \
                              --format json \
                              --out-file /tmp/infracost-base.json

      # 計算 PR (新)
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Generate Cost Diff
        run: |
          infracost diff --path aws-tf \
                         --format json \
                         --compare-to /tmp/infracost-base.json \
                         --out-file /tmp/infracost.json

      # Console 顯示 + PR 留言 + HTML Report
      - name: Show Cost Table in Console
        run: infracost output --path /tmp/infracost.json --format table

      - name: Post Infracost Comment
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update

      - name: Generate Cost HTML Report
        run: infracost output --path /tmp/infracost.json --format html --out-file infracost-report.html

      - name: Upload Cost Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infracost-report-pr
          path: |
            infracost-report.html
            /tmp/infracost.json

  # ====================================================
  # Job 3: Main Branch Cost Analysis (Push Main 專用)
  # 邏輯：只計總數 (Total)，無 Diff，但要出 Report
  # ====================================================
  cost-estimation-main:
    name: Cost Analysis (Main Total)
    runs-on: ubuntu-latest
    # 當 Push 去 Main 時執行
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
          currency: USD

      # 1. 直接計算總價 (Breakdown)
      - name: Run Infracost Breakdown
        run: |
          infracost breakdown --path aws-tf \
                              --format json \
                              --out-file infracost.json

      # 2. 顯示在 Console (這就是你想要的！Push Main 都有得睇)
      - name: Show Cost Table in Console
        run: |
          infracost output --path infracost.json --format table

      # 3. 生成 HTML Report (即使不上 Cloud Dashboard 都有得下載)
      - name: Generate HTML Report
        run: |
          infracost output --path infracost.json --format html --out-file infracost-main-report.html

      # 4. Upload Artifact
      - name: Upload Cost Report
        uses: actions/upload-artifact@v4
        with:
          name: infracost-report-main
          path: |
            infracost-main-report.html
            infracost.json

      # 5. (可選) 繼續 Upload 去 Cloud Dashboard
      # 如果 Trial 過期，這步可能會 Fail，你可以隨時 Comment 佢
      - name: Upload to Infracost Cloud
        run: infracost upload --path infracost.json
        continue-on-error: true # 就算 Upload 失敗 (例如過期)，都唔好整死個 CI
