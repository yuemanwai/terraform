name: AWS Terraform Security & Cost Analysis

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write # 必須有，Infracost 才能在 PR 留言

jobs:
  # ====================================================
  # Job 1: Security Scan (Trivy)
  # 跑係所有 Push & PR，確保安全
  # ====================================================
  trivy-security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # Step 0: 下載 Template (如你所願，讀本地 .github/trivy.tpl)
      # 確保你 repo 入面真係有呢個 file，否則這步會 fail
      # 如果未有，可以暫時 comment 咗 template 相關行數

      - name: Set Security Report Date
        id: security_report_date
        run: echo "value=$(date +'%d-%m-%Y')" >> "$GITHUB_OUTPUT"

      - name: Verify Trivy template exists
        run: |
          test -f "$GITHUB_WORKSPACE/.github/trivy.tpl"
          echo "Using template: $GITHUB_WORKSPACE/.github/trivy.tpl"

      - name: Generate Trivy HTML Report
        run: |
          trivy fs ./aws-tf \
            --scanners vuln,secret,misconfig \
            --format template \
            --template "@$GITHUB_WORKSPACE/.github/trivy.tpl" \
            --output "aws-security-report-${{ steps.security_report_date.outputs.value }}.html" \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --exit-code 0

      - name: Show Security Risks in Console
        run: |
          trivy fs ./aws-tf \
            --scanners vuln,secret,misconfig \
            --format table \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --exit-code 0

      - name: Upload Security Artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: aws-security-report (${{ steps.security_report_date.outputs.value }})
          path: aws-security-report-${{ steps.security_report_date.outputs.value }}.html
          retention-days: 60

  # ====================================================
  # Job 2: Cost Estimation (Pull Request 專用)
  # 邏輯：有對比 (Diff)，有留言 (Comment)
  # ====================================================
  cost-estimation-pr:
    name: Cost Estimation (PR Diff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

    steps:
      - name: Install Infracost CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh -s -- -b /usr/local/bin
          infracost --version

      - name: Set PR Cost Report Date
        id: pr_report_date
        run: echo "value=$(date +'%d-%m-%Y')" >> "$GITHUB_OUTPUT"

      # 計算 Base (舊)
      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: "${{ github.event.pull_request.base.ref }}"

      - name: Generate Baseline Cost
        run: |
          infracost breakdown --path aws-tf \
                              --show-skipped \
                              --format json \
                              --out-file /tmp/infracost-base.json

      # 計算 PR (新)
      - name: Checkout PR branch
        uses: actions/checkout@v5

      - name: Generate Cost Diff
        run: |
          infracost diff --path aws-tf \
                         --show-skipped \
                         --format json \
                         --compare-to /tmp/infracost-base.json \
                         --out-file infracost-report-pr-${{ steps.pr_report_date.outputs.value }}.json

      # Console 顯示 + PR 留言 + HTML Report
      - name: Show Cost Table in Console
        run: infracost output --path infracost-report-pr-${{ steps.pr_report_date.outputs.value }}.json --format table

      - name: Post Infracost Comment
        run: |
          infracost comment github --path infracost-report-pr-${{ steps.pr_report_date.outputs.value }}.json \
                                   --repo $GITHUB_REPOSITORY \
                                   --github-token ${{ github.token }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update

      - name: Generate Cost HTML Report
        run: infracost output --path infracost-report-pr-${{ steps.pr_report_date.outputs.value }}.json --format html --out-file infracost-report-pr-${{ steps.pr_report_date.outputs.value }}.html

      - name: Upload Cost Report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: infracost-report-pr (${{ steps.pr_report_date.outputs.value }})
          path: |
            infracost-report-pr-${{ steps.pr_report_date.outputs.value }}.html
            infracost-report-pr-${{ steps.pr_report_date.outputs.value }}.json
          retention-days: 60

  # ====================================================
  # Job 3: Main Branch Cost Analysis (Push Main 專用)
  # 邏輯：只計總數 (Total)，無 Diff，但要出 Report
  # ====================================================
  cost-estimation-main:
    name: Cost Analysis (Main Total)
    runs-on: ubuntu-latest
    # 當 Push 去 Main 時執行
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Install Infracost CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh -s -- -b /usr/local/bin
          infracost --version

      - name: Set Main Cost Report Date
        id: main_report_date
        run: echo "value=$(date +'%d-%m-%Y')" >> "$GITHUB_OUTPUT"

      # 1. 直接計算總價 (Breakdown)
      - name: Run Infracost Breakdown
        run: |
          infracost breakdown --path aws-tf \
                              --show-skipped \
                              --format json \
                              --out-file infracost-report-main-${{ steps.main_report_date.outputs.value }}.json

      # 2. 顯示在 Console (這就是你想要的！Push Main 都有得睇)
      - name: Show Cost Table in Console
        run: |
          infracost output --path infracost-report-main-${{ steps.main_report_date.outputs.value }}.json --format table

      # 3. 生成 HTML Report (即使不上 Cloud Dashboard 都有得下載)
      - name: Generate HTML Report
        run: |
          infracost output --path infracost-report-main-${{ steps.main_report_date.outputs.value }}.json --format html --out-file infracost-report-main-${{ steps.main_report_date.outputs.value }}.html

      - name: Upload Cost Report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: infracost-report-main (${{ steps.main_report_date.outputs.value }})
          path: |
            infracost-report-main-${{ steps.main_report_date.outputs.value }}.html
            infracost-report-main-${{ steps.main_report_date.outputs.value }}.json
          retention-days: 60
