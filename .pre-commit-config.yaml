repos:
  # Repository-wide hygiene checks for all file changes.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Secret scanning is applied globally to prevent credential leaks in any directory.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # Terraform quality checks are scoped to the AWS module directory.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.88.0
    hooks:
      - id: terraform_fmt
        files: ^aws-tf/

      # - id: terraform_docs
      #   files: ^aws-tf/
      #   args:
      #     # Disable lockfile updates in documentation generation for stable CI behavior.
      #     - --args=--lockfile=false
